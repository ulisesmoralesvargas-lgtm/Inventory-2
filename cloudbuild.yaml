steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/inventory-2:$COMMIT_SHA', '.']

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/inventory-2:$COMMIT_SHA']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'inventory-2'
      - '--image'
      - 'gcr.io/$PROJECT_ID/inventory-2:$COMMIT_SHA'
      - '--region'
      - 'northamerica-south1'
      - '--platform'
      - 'managed'

images:
  - 'gcr.io/$PROJECT_ID/inventory-2:$COMMIT_SHA'
